name: CrosswordNative
options:
  createIntermediateGroups: true
settings:
  base:
    DEVELOPMENT_TEAM: DQNRTU7888
    SWIFT_VERSION: 6.0
targets:
  CrosswordNative:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ios/CrosswordNative
    info:
      path: ios/CrosswordNative/Info.plist
      properties:
        CFBundleDisplayName: Crossword
        ITSAppUsesNonExemptEncryption: false
        LSRequiresIPhoneOS: true
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchScreen:
          UIColorName: LaunchBackground
          UIImageName: BrandMark
          UIImageRespectsSafeAreaInsets: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.joshbenja.crosswordnative
        PRODUCT_NAME: Crossword
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: false
        INFOPLIST_FILE: ios/CrosswordNative/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    scheme:
      testTargets: []
